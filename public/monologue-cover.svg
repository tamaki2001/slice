<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e3ebf2"/>
      <stop offset="55%" stop-color="#b9cfde"/>
      <stop offset="100%" stop-color="#7e9db4"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.78" cy="0.18" r="0.22">
      <stop offset="0%" stop-color="#f5efe2" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#f5efe2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 空のグラデーション -->
  <rect width="200" height="300" fill="url(#sky)"/>

  <!-- 淡い陽光 -->
  <rect width="200" height="300" fill="url(#sun)"/>

  <!-- 雲 -->
  <g fill="#f1ede4" opacity="0.55">
    <ellipse cx="50" cy="95" rx="38" ry="6"/>
    <ellipse cx="62" cy="100" rx="22" ry="4"/>
  </g>
  <g fill="#f1ede4" opacity="0.4">
    <ellipse cx="140" cy="160" rx="30" ry="5"/>
    <ellipse cx="148" cy="164" rx="18" ry="3"/>
  </g>
  <g fill="#f1ede4" opacity="0.3">
    <ellipse cx="90" cy="225" rx="44" ry="5"/>
  </g>
</svg>
